    <text style="font-weight: 700; font-size: 9.2px; font-family: 'AppleGothic'; text-anchor: start; fill: #d95d39" x="779.184" y="406.3144" transform="rotate(-0 779.184 406.3144)">gradient stop</text>
   </g>
   <g id="text_24">
    <text style="font-weight: 700; font-size: 10.5px; font-family: 'AppleGothic'; text-anchor: middle; fill: #16324f" x="551.52" y="493.27776" transform="rotate(-0 551.52 493.27776)">현재 입력은 관측된 사건 이력이다. 날씨, 공휴일, 프로모션 같은 외생변수는 아직 포함하지 않았다.</text>
   </g>
  </g>
  <g id="text_25">
   <text style="font-weight: 700; font-size: 17px; font-family: 'AppleGothic'; text-anchor: start; fill: #16324f" x="7.2" y="20.985937" transform="rotate(-0 7.2 20.985937)">F3. RMTPP의 확률적 예측 계약은 유지하고 history encoder와 quantity branch를 확장했다</text>
  </g>
  <g id="text_26">
   <text style="font-size: 10.5px; font-family: 'AppleGothic'; text-anchor: start; fill: #667085" x="7.2" y="37.296" transform="rotate(-0 7.2 37.296)">V3b는 V2와 같은 Titan + static LMM을 사용하며, Taxi에서 value head와 quantity gradient route만 변경한다.</text>
  </g>
 </g>
